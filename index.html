<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenzas Urbanas</title>

<style>
body{
  margin:0;
  font-family:Poppins, sans-serif;
  background:#a88ac0;
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
}

.logo{
  width:140px;
  height:140px;
  object-fit:contain;
  border-radius:20px;
}

/* TITULOS */
h1{
  font-size:40px;
  margin:10px 0;
}

/* SECCIONES */
section{
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.15);
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

/* IMAGEN */
.img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

/* BOTONES */
button{
  background:#6f4a8e;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-top:8px;
}

/* CART */
.cart{
  position:fixed;
  top:15px;
  right:15px;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <!-- LOGO -->
  <img src="Brown and Beige Aesthetic Beauty Circle Logo_20241211_140012_0000.png" class="logo" alt="Logo">

  <h1>Trenzas Urbanas</h1>
  <p>Creamos estilos únicos a través de trenzas personalizadas para todas las edades</p>
</header>

<div class="cart" id="cart">
🛒 Carrito (<span id="count">0</span>)
</div>

<!-- CONTENEDOR -->
<section id="catalogo"></section>

<script>
let carrito = [];

const catalogo = [
{
titulo:"⭐ Trenzas Simples",
servicios:[
{nombre:"2 Trenzas Boxeadoras",precio:10000,img:"https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9"},
{nombre:"4 Trenzas",precio:15000,img:"https://images.unsplash.com/photo-1526045478516-99145907023c"}
]
},
{
titulo:"✨ Trenzas con Extensiones",
servicios:[
{nombre:"Box Braids Jumbo",precio:80000,img:"https://images.unsplash.com/photo-1519741497674-611481863552"},
{nombre:"Fulanis",precio:120000,img:"https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb"}
]
},
{
titulo:"👑 Coletas",
servicios:[
{nombre:"Coleta Alta",precio:12000,img:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
{nombre:"Bubble Ponytail",precio:30000,img:"https://images.unsplash.com/photo-1522337360788-8b13dee7a37e"}
]
},
{
titulo:"💜 Recogidos",
servicios:[
{nombre:"Recogido Elegante",precio:35000,img:"https://images.unsplash.com/photo-1487412720507-e7ab37603c6f"}
]
}
];

const cont = document.getElementById("catalogo");

catalogo.forEach(categoria=>{
  cont.innerHTML += `<h2>${categoria.titulo}</h2>`;

  let grid = `<div class="grid">`;

  categoria.servicios.forEach(s=>{
    grid += `
    <div class="card">
      <img class="img" src="${s.img}">
      <h3>${s.nombre}</h3>
      <p><b>$${s.precio}</b></p>
      <button onclick="agregar('${s.nombre}',${s.precio})">Agregar</button>
    </div>`;
  });

  grid += `</div>`;
  cont.innerHTML += grid;
});

function agregar(nombre,precio){
  carrito.push({nombre,precio});
  document.getElementById("count").innerText = carrito.length;
}

document.getElementById("cart").onclick = function(){

if(carrito.length===0){
alert("Carrito vacío");
return;
}

let mensaje="Hola quiero reservar:%0A%0A";
let total=0;

carrito.forEach(i=>{
mensaje+=`• ${i.nombre} - $${i.precio}%0A`;
total+=i.precio;
});

mensaje+=`%0ATotal: $${total}`;

window.open("https://wa.me/5493705141113?text="+mensaje);
};
</script>

</body>
</html>
